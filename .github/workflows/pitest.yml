name: Pitest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pitest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Groovy
        run: |
          curl --fail-with-body -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install groovy
          echo "$HOME/.sdkman/candidates/groovy/current/bin" >> "$GITHUB_PATH"
          groovy --version

      - name: Setup Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Run Pitest with suppression check
        run: ./.ci/pitest.sh

      - name: Patch command for Pitest
        if: failure()
        run: |
          ./.ci/print-diff-as-patch.sh target/pitest.patch

      - name: Upload Pitest Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pitest-report
          path: target/pit-reports/
          retention-days: 7
