name: Pitest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-missing-pitests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xmlstarlet
        run: sudo apt-get update && sudo apt-get install -y xmlstarlet

      - name: Check missing pitests
        run: ./.ci/validation.sh check-missing-pitests

  pitest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile:
          - common
          - marker
          - parser
          - recipe-1
          - recipe-2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Groovy
        run: |
          curl --fail-with-body -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install groovy
          echo "$HOME/.sdkman/candidates/groovy/current/bin" >> "$GITHUB_PATH"
          groovy --version

      - name: Setup Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Run Pitest pitest-${{ matrix.profile }} with suppression check
        run: ./.ci/pitest.sh "pitest-${{ matrix.profile }}"

      - name: Patch command for pitest-${{ matrix.profile }}
        if: failure()
        run: |
          ./.ci/print-diff-as-patch.sh target/pitest-${{ matrix.profile }}.patch

      - name: Upload Pitest Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pitest-${{ matrix.profile }}-report
          path: target/pit-reports/
          retention-days: 7
